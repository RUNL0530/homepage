<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页 - 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 顶部工具栏 */
        .top-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: #764ba2;
        }

        .search-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        /* 用户栏 */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #667eea;
        }

        .user-name {
            font-weight: bold;
            color: #333;
        }

        .login-prompt {
            color: #666;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login {
            background: #4285f4;
        }

        .btn-logout {
            background: #ef4444;
            padding: 8px 20px;
            font-size: 14px;
        }

        /* 倒计时卡片 */
        .countdown-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .countdown-title {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .countdown-display {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
        }

        .countdown-unit {
            font-size: 18px;
            color: #666;
        }

        /* 番茄钟 */
        .pomodoro-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .pomodoro-timer {
            font-size: 64px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .pomodoro-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-warning {
            background: #f59e0b;
        }

        .btn-danger {
            background: #ef4444;
        }

        /* 待办事项 */
        .todo-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .todo-input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .todo-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .todo-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
        }

        .todo-delete {
            background: #ef4444;
            padding: 5px 15px;
            font-size: 14px;
        }

        /* 硬件项目笔记 */
        .hardware-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .project-list {
            display: grid;
            gap: 15px;
        }

        .project-item {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .project-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .project-desc {
            color: #666;
            margin-bottom: 10px;
        }

        .project-status {
            display: inline-block;
            padding: 5px 15px;
            background: #667eea;
            color: white;
            border-radius: 15px;
            font-size: 12px;
        }

        /* 单词卡片 */
        .word-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .word-title {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        .word-phonetic {
            font-size: 20px;
            color: #888;
            margin-bottom: 15px;
        }

        .word-meaning {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
            margin-bottom: 20px;
        }

        .word-meaning.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 网站导航 */
        .websites-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .websites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .website-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
            position: relative;
        }

        .website-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .website-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .website-desc {
            font-size: 12px;
            opacity: 0.9;
        }

        /* 两列布局 */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .three-column {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .three-column {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部工具栏 -->
        <div class="top-bar">
            <!-- 搜索框 -->
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="快速搜索 Google / 百度 / GitHub..." onkeypress="if(event.key==='Enter') quickSearch()">
                <button class="search-btn" onclick="quickSearch()">🔍 搜索</button>
            </div>

            <!-- 用户栏 -->
            <div class="user-bar">
                <div id="userInfo" class="user-info">
                    <div class="login-prompt">🔐 请先登录以同步数据</div>
                </div>
                <div>
                    <button id="loginBtn" class="btn-login" onclick="login()">🚀 Google登录</button>
                    <button id="logoutBtn" class="btn-logout" onclick="logout()" style="display: none;">退出登录</button>
                </div>
            </div>
        </div>

        <!-- 三列布局：倒计时、番茄钟、单词 -->
        <div class="three-column">
            <!-- 倒计时 -->
            <div class="countdown-card">
                <div class="countdown-title">📅 距离六级考试</div>
                <div class="countdown-display" id="countdownDays">-</div>
                <div class="countdown-unit">天</div>
                <button onclick="setExamDate()" style="margin-top: 15px; font-size: 14px; padding: 8px 20px;">设置日期</button>
            </div>

            <!-- 番茄钟 -->
            <div class="pomodoro-card">
                <div class="countdown-title">🍅 番茄钟</div>
                <div class="pomodoro-timer" id="pomodoroTimer">25:00</div>
                <div class="pomodoro-controls">
                    <button class="btn-success" onclick="startPomodoro()">开始</button>
                    <button class="btn-warning" onclick="pausePomodoro()">暂停</button>
                    <button class="btn-danger" onclick="resetPomodoro()">重置</button>
                </div>
                <div style="margin-top: 15px; color: #666; font-size: 14px;" id="pomodoroStatus">专注25分钟，休息5分钟</div>
            </div>

            <!-- 单词学习 -->
            <div class="word-card">
                <div class="word-title" id="word">Loading...</div>
                <div class="word-phonetic" id="phonetic"></div>
                <div class="word-meaning" id="meaning"></div>
                <div class="button-group">
                    <button onclick="toggleMeaning()">显示释义</button>
                    <button onclick="nextWord()">换一个</button>
                </div>
                <div style="margin-top: 15px; color: #666; font-size: 14px;">今日已学：<strong id="todayCount">0</strong> 个</div>
            </div>
        </div>

        <!-- 两列布局：待办事项、硬件项目 -->
        <div class="two-column">
            <!-- 待办事项 -->
            <div class="todo-card">
                <div class="section-title">✅ 待办事项</div>
                <div class="todo-input-box">
                    <input type="text" class="todo-input" id="todoInput" placeholder="添加新任务..." onkeypress="if(event.key==='Enter') addTodo()">
                    <button onclick="addTodo()">➕ 添加</button>
                </div>
                <ul class="todo-list" id="todoList"></ul>
            </div>

            <!-- 硬件项目笔记 -->
            <div class="hardware-card">
                <div class="section-title">🔧 硬件项目</div>
                <div class="project-list" id="projectList"></div>
                <button onclick="addProject()" style="margin-top: 15px; width: 100%;">➕ 添加项目</button>
            </div>
        </div>

        <!-- 网站导航 -->
        <div class="websites-section">
            <div class="section-title">🔖 常用网站</div>
            <div class="websites-grid" id="websitesGrid"></div>
            <button onclick="addWebsite()">➕ 添加网站</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCnmNFbqOXGbz1otkOAozurWGS_YN5XeWE",
            authDomain: "runl-85bf0.firebaseapp.com",
            projectId: "runl-85bf0",
            storageBucket: "runl-85bf0.firebasestorage.app",
            messagingSenderId: "595101013886",
            appId: "1:595101013886:web:31a62290779239172d452f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 六级词汇库
        const cet6Words = [
            { word: "abandon", phonetic: "/əˈbændən/", meaning: "v. 放弃；抛弃 n. 放纵" },
            { word: "abstract", phonetic: "/ˈæbstrækt/", meaning: "adj. 抽象的 n. 摘要 v. 提取" },
            { word: "accelerate", phonetic: "/əkˈseləreɪt/", meaning: "v. 加速；促进" },
            { word: "accomplish", phonetic: "/əˈkʌmplɪʃ/", meaning: "v. 完成；实现" },
            { word: "accumulate", phonetic: "/əˈkjuːmjəleɪt/", meaning: "v. 积累；堆积" },
            { word: "accurate", phonetic: "/ˈækjərət/", meaning: "adj. 精确的；准确的" },
            { word: "acknowledge", phonetic: "/əkˈnɑːlɪdʒ/", meaning: "v. 承认；答谢" },
            { word: "acquire", phonetic: "/əˈkwaɪər/", meaning: "v. 获得；学到" },
            { word: "adequate", phonetic: "/ˈædɪkwət/", meaning: "adj. 足够的；适当的" },
            { word: "adjacent", phonetic: "/əˈdʒeɪsnt/", meaning: "adj. 邻近的；毗连的" }
        ];

        const defaultWebsites = [
            { name: "百度", url: "https://www.baidu.com", desc: "搜索引擎" },
            { name: "Google", url: "https://www.google.com", desc: "搜索引擎" },
            { name: "GitHub", url: "https://github.com", desc: "代码托管" },
            { name: "B站", url: "https://www.bilibili.com", desc: "视频网站" }
        ];

        let currentUser = null;
        let userData = {
            websites: [...defaultWebsites],
            todos: [],
            projects: [],
            examDate: null,
            todayCount: 0,
            viewedWords: []
        };

        let pomodoroInterval = null;
        let pomodoroSeconds = 25 * 60;
        let pomodoroRunning = false;

        // 登录相关
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('userInfo').innerHTML = `
                    <img src="${user.photoURL}" class="user-avatar">
                    <div><div class="user-name">${user.displayName}</div></div>
                `;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                loadUserData(user.uid);
            } else {
                document.getElementById('userInfo').innerHTML = '<div class="login-prompt">🔐 请先登录以同步数据</div>';
                document.getElementById('loginBtn').style.display = 'inline-block';
                document.getElementById('logoutBtn').style.display = 'none';
                loadLocalData();
            }
        });

        window.login = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert('登录失败: ' + error.message);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            userData = { websites: [...defaultWebsites], todos: [], projects: [], examDate: null, todayCount: 0, viewedWords: [] };
            renderAll();
        };

        function loadUserData(uid) {
            const docRef = doc(db, 'users', uid);
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    userData = { ...userData, ...data };
                    if (!userData.websites) userData.websites = [...defaultWebsites];
                    if (!userData.todos) userData.todos = [];
                    if (!userData.projects) userData.projects = [];
                }
                renderAll();
                updateCountdown();
            });
        }

        function saveUserData() {
            if (!currentUser) {
                localStorage.setItem('userData', JSON.stringify(userData));
                return;
            }
            const docRef = doc(db, 'users', currentUser.uid);
            setDoc(docRef, { ...userData, updatedAt: new Date().toISOString() });
        }

        function loadLocalData() {
            const saved = localStorage.getItem('userData');
            if (saved) {
                userData = JSON.parse(saved);
            }
            renderAll();
            updateCountdown();
        }

        // 快速搜索
        window.quickSearch = () => {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        };

        // 倒计时
        window.setExamDate = () => {
            const dateStr = prompt('输入六级考试日期（格式：2026-12-15）：');
            if (dateStr) {
                userData.examDate = dateStr;
                saveUserData();
                updateCountdown();
            }
        };

        function updateCountdown() {
            if (!userData.examDate) {
                document.getElementById('countdownDays').textContent = '未设置';
                return;
            }
            const today = new Date();
            const exam = new Date(userData.examDate);
            const diff = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
            document.getElementById('countdownDays').textContent = diff > 0 ? diff : '已过期';
        }

        // 番茄钟
        window.startPomodoro = () => {
            if (pomodoroRunning) return;
            pomodoroRunning = true;
            pomodoroInterval = setInterval(() => {
                pomodoroSeconds--;
                if (pomodoroSeconds <= 0) {
                    alert('⏰ 时间到！休息一下吧！');
                    resetPomodoro();
                }
                updatePomodoroDisplay();
            }, 1000);
        };

        window.pausePomodoro = () => {
            pomodoroRunning = false;
            clearInterval(pomodoroInterval);
        };

        window.resetPomodoro = () => {
            pomodoroRunning = false;
            clearInterval(pomodoroInterval);
            pomodoroSeconds = 25 * 60;
            updatePomodoroDisplay();
        };

        function updatePomodoroDisplay() {
            const mins = Math.floor(pomodoroSeconds / 60);
            const secs = pomodoroSeconds % 60;
            document.getElementById('pomodoroTimer').textContent =
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // 单词学习
        window.nextWord = () => {
            const word = cet6Words[Math.floor(Math.random() * cet6Words.length)];
            document.getElementById('word').textContent = word.word;
            document.getElementById('phonetic').textContent = word.phonetic;
            document.getElementById('meaning').textContent = word.meaning;
            document.getElementById('meaning').classList.remove('show');
            userData.todayCount++;
            document.getElementById('todayCount').textContent = userData.todayCount;
            saveUserData();
        };

        window.toggleMeaning = () => {
            document.getElementById('meaning').classList.toggle('show');
        };

        // 待办事项
        window.addTodo = () => {
            const text = document.getElementById('todoInput').value.trim();
            if (!text) return;
            userData.todos.push({ text, completed: false, id: Date.now() });
            document.getElementById('todoInput').value = '';
            saveUserData();
            renderTodos();
        };

        window.toggleTodo = (id) => {
            const todo = userData.todos.find(t => t.id === id);
            if (todo) todo.completed = !todo.completed;
            saveUserData();
            renderTodos();
        };

        window.deleteTodo = (id) => {
            userData.todos = userData.todos.filter(t => t.id !== id);
            saveUserData();
            renderTodos();
        };

        function renderTodos() {
            const list = document.getElementById('todoList');
            list.innerHTML = userData.todos.map(todo => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                    <span class="todo-text">${todo.text}</span>
                    <button class="todo-delete" onclick="deleteTodo(${todo.id})">删除</button>
                </li>
            `).join('');
        }

        // 硬件项目
        window.addProject = () => {
            const name = prompt('项目名称：');
            if (!name) return;
            const desc = prompt('项目描述：') || '';
            const status = prompt('状态（进行中/已完成/计划中）：') || '进行中';
            userData.projects.push({ name, desc, status, id: Date.now() });
            saveUserData();
            renderProjects();
        };

        window.deleteProject = (id) => {
            if (confirm('确定删除这个项目吗？')) {
                userData.projects = userData.projects.filter(p => p.id !== id);
                saveUserData();
                renderProjects();
            }
        };

        function renderProjects() {
            const list = document.getElementById('projectList');
            list.innerHTML = userData.projects.map(proj => `
                <div class="project-item">
                    <div class="project-name">${proj.name}</div>
                    <div class="project-desc">${proj.desc}</div>
                    <span class="project-status">${proj.status}</span>
                    <button onclick="deleteProject(${proj.id})" style="float: right; font-size: 12px; padding: 5px 10px; background: #ef4444;">删除</button>
                </div>
            `).join('');
        }

        // 网站导航
        window.addWebsite = () => {
            const name = prompt('网站名称：');
            if (!name) return;
            const url = prompt('网站地址：');
            if (!url) return;
            const desc = prompt('描述：') || '';
            userData.websites.push({ name, url, desc });
            saveUserData();
            renderWebsites();
        };

        function renderWebsites() {
            const grid = document.getElementById('websitesGrid');
            grid.innerHTML = userData.websites.map(site => `
                <a href="${site.url}" target="_blank" class="website-card">
                    <div class="website-name">${site.name}</div>
                    <div class="website-desc">${site.desc}</div>
                </a>
            `).join('');
        }

        function renderAll() {
            renderTodos();
            renderProjects();
            renderWebsites();
            document.getElementById('todayCount').textContent = userData.todayCount || 0;
            nextWord();
        }

        // 初始化
        renderAll();
        updateCountdown();
        setInterval(updateCountdown, 60000);
    </script>
</body>
</html>
