<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页 - 云端版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 登录状态栏 */
        .user-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #667eea;
        }

        .user-name {
            font-weight: bold;
            color: #333;
        }

        .sync-status {
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .login-prompt {
            text-align: center;
            color: #666;
        }

        /* 单词卡片 */
        .word-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .word-title {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .word-phonetic {
            font-size: 20px;
            color: #888;
            margin-bottom: 15px;
        }

        .word-meaning {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .word-meaning.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #764ba2;
        }

        .btn-secondary:hover {
            background: #643a8a;
        }

        .btn-login {
            background: #4285f4;
        }

        .btn-login:hover {
            background: #3367d6;
        }

        .btn-logout {
            background: #ef4444;
            padding: 8px 20px;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: #dc2626;
        }

        /* 网站导航 */
        .websites-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .websites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .website-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
            position: relative;
        }

        .website-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .website-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .website-desc {
            font-size: 12px;
            opacity: 0.9;
        }

        .delete-site-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: none;
            padding: 0;
        }

        .website-card:hover .delete-site-btn {
            display: block;
        }

        /* 统计信息 */
        .stats {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eee;
            color: #666;
            font-size: 14px;
        }

        /* 添加网站按钮 */
        .add-website-btn {
            background: #10b981;
            margin-top: 15px;
        }

        .add-website-btn:hover {
            background: #059669;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .word-title {
                font-size: 36px;
            }

            .websites-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .user-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 用户登录状态栏 -->
        <div class="user-bar">
            <div id="userInfo" class="user-info">
                <div class="login-prompt">🔐 请先登录以同步数据</div>
            </div>
            <div>
                <button id="loginBtn" class="btn-login" onclick="login()">🚀 Google登录</button>
                <button id="logoutBtn" class="btn-logout" onclick="logout()" style="display: none;">退出登录</button>
            </div>
        </div>

        <!-- 单词学习卡片 -->
        <div class="word-card">
            <div class="word-title" id="word">Loading...</div>
            <div class="word-phonetic" id="phonetic"></div>
            <div class="word-meaning" id="meaning"></div>

            <div class="button-group">
                <button onclick="toggleMeaning()">显示/隐藏释义</button>
                <button onclick="nextWord()" class="btn-secondary">换一个单词</button>
            </div>

            <div class="stats">
                今日已学：<strong id="todayCount">0</strong> 个单词
                <span id="syncStatus" class="sync-status" style="display: none;">
                    <span class="sync-indicator"></span>
                    已同步到云端
                </span>
            </div>
        </div>

        <!-- 常用网站导航 -->
        <div class="websites-section">
            <div class="section-title">🔖 常用网站</div>
            <div id="websitesLoading" class="loading" style="display: none;">加载中...</div>
            <div class="websites-grid" id="websitesGrid">
                <!-- 网站卡片将通过JavaScript动态生成 -->
            </div>
            <button class="add-website-btn" onclick="addWebsite()" id="addWebsiteBtn">➕ 添加新网站</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Firebase配置
        const firebaseConfig = {
            apiKey: "AIzaSyCnmNFbqOXGbz1otkOAozurWGS_YN5XeWE",
            authDomain: "runl-85bf0.firebaseapp.com",
            projectId: "runl-85bf0",
            storageBucket: "runl-85bf0.firebasestorage.app",
            messagingSenderId: "595101013886",
            appId: "1:595101013886:web:31a62290779239172d452f",
            measurementId: "G-NMH57P3SRT"
        };

        // 初始化Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 六级词汇库
        const cet6Words = [
            { word: "abandon", phonetic: "/əˈbændən/", meaning: "v. 放弃；抛弃\nn. 放纵" },
            { word: "abstract", phonetic: "/ˈæbstrækt/", meaning: "adj. 抽象的\nn. 摘要\nv. 提取" },
            { word: "accelerate", phonetic: "/əkˈseləreɪt/", meaning: "v. 加速；促进" },
            { word: "accomplish", phonetic: "/əˈkʌmplɪʃ/", meaning: "v. 完成；实现" },
            { word: "accumulate", phonetic: "/əˈkjuːmjəleɪt/", meaning: "v. 积累；堆积" },
            { word: "accurate", phonetic: "/ˈækjərət/", meaning: "adj. 精确的；准确的" },
            { word: "acknowledge", phonetic: "/əkˈnɑːlɪdʒ/", meaning: "v. 承认；答谢" },
            { word: "acquire", phonetic: "/əˈkwaɪər/", meaning: "v. 获得；学到" },
            { word: "adequate", phonetic: "/ˈædɪkwət/", meaning: "adj. 足够的；适当的" },
            { word: "adjacent", phonetic: "/əˈdʒeɪsnt/", meaning: "adj. 邻近的；毗连的" },
            { word: "advocate", phonetic: "/ˈædvəkeɪt/", meaning: "v. 提倡；拥护\nn. 提倡者" },
            { word: "aesthetic", phonetic: "/esˈθetɪk/", meaning: "adj. 美学的；审美的" },
            { word: "allocate", phonetic: "/ˈæləkeɪt/", meaning: "v. 分配；拨出" },
            { word: "alternative", phonetic: "/ɔːlˈtɜːrnətɪv/", meaning: "adj. 供选择的\nn. 选择；替代品" },
            { word: "ambiguous", phonetic: "/æmˈbɪɡjuəs/", meaning: "adj. 模糊的；含糊的" },
            { word: "anticipate", phonetic: "/ænˈtɪsɪpeɪt/", meaning: "v. 预期；期望" },
            { word: "apparatus", phonetic: "/ˌæpəˈreɪtəs/", meaning: "n. 器械；装置；仪器" },
            { word: "arbitrary", phonetic: "/ˈɑːrbɪtreri/", meaning: "adj. 任意的；武断的" },
            { word: "architecture", phonetic: "/ˈɑːrkɪtektʃər/", meaning: "n. 建筑学；建筑风格" },
            { word: "artificial", phonetic: "/ˌɑːrtɪˈfɪʃl/", meaning: "adj. 人工的；人造的" },
            { word: "assemble", phonetic: "/əˈsembl/", meaning: "v. 集合；装配" },
            { word: "assess", phonetic: "/əˈses/", meaning: "v. 评估；估价" },
            { word: "attribute", phonetic: "/əˈtrɪbjuːt/", meaning: "v. 归因于\nn. 属性" },
            { word: "authentic", phonetic: "/ɔːˈθentɪk/", meaning: "adj. 真正的；可信的" },
            { word: "automatic", phonetic: "/ˌɔːtəˈmætɪk/", meaning: "adj. 自动的；无意识的" },
            { word: "beneficial", phonetic: "/ˌbenɪˈfɪʃl/", meaning: "adj. 有益的；有利的" },
            { word: "catastrophe", phonetic: "/kəˈtæstrəfi/", meaning: "n. 大灾难；大祸" },
            { word: "coherent", phonetic: "/koʊˈhɪrənt/", meaning: "adj. 连贯的；一致的" },
            { word: "collaborate", phonetic: "/kəˈlæbəreɪt/", meaning: "v. 合作；协作" },
            { word: "compatible", phonetic: "/kəmˈpætəbl/", meaning: "adj. 兼容的；和谐的" },
            { word: "compensate", phonetic: "/ˈkɑːmpenseɪt/", meaning: "v. 补偿；赔偿" },
            { word: "complex", phonetic: "/kəmˈpleks/", meaning: "adj. 复杂的\nn. 综合体" },
            { word: "comprehensive", phonetic: "/ˌkɑːmprɪˈhensɪv/", meaning: "adj. 全面的；综合的" },
            { word: "conceive", phonetic: "/kənˈsiːv/", meaning: "v. 构思；怀孕" },
            { word: "concentrate", phonetic: "/ˈkɑːnsntreɪt/", meaning: "v. 集中；浓缩" },
            { word: "contemporary", phonetic: "/kənˈtempəreri/", meaning: "adj. 当代的\nn. 同时代的人" },
            { word: "controversial", phonetic: "/ˌkɑːntrəˈvɜːrʃl/", meaning: "adj. 有争议的" },
            { word: "conventional", phonetic: "/kənˈvenʃənl/", meaning: "adj. 传统的；常规的" },
            { word: "deliberate", phonetic: "/dɪˈlɪbərət/", meaning: "adj. 故意的\nv. 仔细考虑" },
            { word: "demonstrate", phonetic: "/ˈdemənstreɪt/", meaning: "v. 证明；演示" },
            { word: "deviate", phonetic: "/ˈdiːvieɪt/", meaning: "v. 偏离；违背" },
            { word: "distinguish", phonetic: "/dɪˈstɪŋɡwɪʃ/", meaning: "v. 区分；辨别" },
            { word: "dominant", phonetic: "/ˈdɑːmɪnənt/", meaning: "adj. 占优势的；支配的" },
            { word: "elaborate", phonetic: "/ɪˈlæbərət/", meaning: "adj. 精心制作的\nv. 详细说明" },
            { word: "eliminate", phonetic: "/ɪˈlɪmɪneɪt/", meaning: "v. 消除；淘汰" },
            { word: "emphasize", phonetic: "/ˈemfəsaɪz/", meaning: "v. 强调；着重" },
            { word: "enhance", phonetic: "/ɪnˈhæns/", meaning: "v. 提高；增强" },
            { word: "equivalent", phonetic: "/ɪˈkwɪvələnt/", meaning: "adj. 相等的\nn. 等价物" },
            { word: "estimate", phonetic: "/ˈestɪmeɪt/", meaning: "v. 估计；评价\nn. 估计" },
            { word: "facilitate", phonetic: "/fəˈsɪlɪteɪt/", meaning: "v. 促进；使便利" }
        ];

        // 默认网站列表
        const defaultWebsites = [
            { name: "百度", url: "https://www.baidu.com", desc: "搜索引擎" },
            { name: "Google", url: "https://www.google.com", desc: "搜索引擎" },
            { name: "GitHub", url: "https://github.com", desc: "代码托管" },
            { name: "B站", url: "https://www.bilibili.com", desc: "视频网站" },
            { name: "知乎", url: "https://www.zhihu.com", desc: "问答社区" },
            { name: "淘宝", url: "https://www.taobao.com", desc: "购物网站" },
            { name: "YouTube", url: "https://www.youtube.com", desc: "视频平台" },
            { name: "ChatGPT", url: "https://chat.openai.com", desc: "AI助手" }
        ];

        // 全局变量
        let currentUser = null;
        let currentWordIndex = 0;
        let todayCount = 0;
        let viewedWords = new Set();
        let websites = [...defaultWebsites];
        let unsubscribeSnapshot = null;

        // 监听用户登录状态
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                showUserInfo(user);
                loadUserData(user.uid);
            } else {
                currentUser = null;
                showLoginPrompt();
                loadLocalData();
            }
        });

        // 显示用户信息
        function showUserInfo(user) {
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.innerHTML = `
                <img src="${user.photoURL || 'https://via.placeholder.com/40'}" class="user-avatar" alt="头像">
                <div>
                    <div class="user-name">${user.displayName || '用户'}</div>
                    <div style="font-size: 12px; color: #888;">${user.email}</div>
                </div>
            `;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('syncStatus').style.display = 'inline-flex';
        }

        // 显示登录提示
        function showLoginPrompt() {
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.innerHTML = '<div class="login-prompt">🔐 请先登录以同步数据</div>';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('syncStatus').style.display = 'none';
        }

        // 登录
        window.login = async function() {
            try {
                const result = await signInWithPopup(auth, provider);
                console.log('登录成功:', result.user.displayName);
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败: ' + error.message);
            }
        };

        // 登出
        window.logout = async function() {
            try {
                if (unsubscribeSnapshot) {
                    unsubscribeSnapshot();
                }
                await signOut(auth);
                websites = [...defaultWebsites];
                renderWebsites();
            } catch (error) {
                console.error('登出失败:', error);
                alert('登出失败: ' + error.message);
            }
        };

        // 从云端加载用户数据
        async function loadUserData(uid) {
            try {
                const userDocRef = doc(db, 'users', uid);

                // 实时监听数据变化
                unsubscribeSnapshot = onSnapshot(userDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();

                        // 检查日期
                        const lastDate = data.lastDate;
                        const today = new Date().toDateString();

                        if (lastDate === today) {
                            todayCount = data.todayCount || 0;
                            viewedWords = new Set(data.viewedWords || []);
                        } else {
                            todayCount = 0;
                            viewedWords.clear();
                        }

                        // 加载网站列表
                        if (data.websites && data.websites.length > 0) {
                            websites = data.websites;
                        } else {
                            websites = [...defaultWebsites];
                        }

                        document.getElementById('todayCount').textContent = todayCount;
                        renderWebsites();
                    } else {
                        // 首次登录，使用默认数据
                        websites = [...defaultWebsites];
                        renderWebsites();
                    }
                });
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 保存数据到云端
        async function saveUserData() {
            if (!currentUser) {
                // 未登录，保存到本地
                saveLocalData();
                return;
            }

            try {
                const userDocRef = doc(db, 'users', currentUser.uid);
                await setDoc(userDocRef, {
                    todayCount: todayCount,
                    viewedWords: Array.from(viewedWords),
                    lastDate: new Date().toDateString(),
                    websites: websites,
                    updatedAt: new Date().toISOString()
                });
            } catch (error) {
                console.error('保存数据失败:', error);
            }
        }

        // 从本地存储加载数据（未登录时使用）
        function loadLocalData() {
            const saved = localStorage.getItem('homepageData');
            if (saved) {
                const data = JSON.parse(saved);
                todayCount = data.todayCount || 0;
                viewedWords = new Set(data.viewedWords || []);

                const lastDate = data.lastDate;
                const today = new Date().toDateString();
                if (lastDate !== today) {
                    todayCount = 0;
                    viewedWords.clear();
                }
            }

            const savedWebsites = localStorage.getItem('websites');
            if (savedWebsites) {
                websites = JSON.parse(savedWebsites);
            }

            document.getElementById('todayCount').textContent = todayCount;
            renderWebsites();
        }

        // 保存到本地存储（未登录时使用）
        function saveLocalData() {
            const data = {
                todayCount: todayCount,
                viewedWords: Array.from(viewedWords),
                lastDate: new Date().toDateString()
            };
            localStorage.setItem('homepageData', JSON.stringify(data));
            localStorage.setItem('websites', JSON.stringify(websites));
        }

        // 显示单词
        function showWord(index) {
            const wordData = cet6Words[index];
            document.getElementById('word').textContent = wordData.word;
            document.getElementById('phonetic').textContent = wordData.phonetic;
            document.getElementById('meaning').textContent = wordData.meaning;
            document.getElementById('meaning').classList.remove('show');

            if (!viewedWords.has(index)) {
                viewedWords.add(index);
                todayCount++;
                document.getElementById('todayCount').textContent = todayCount;
                saveUserData();
            }
        }

        // 切换释义显示
        window.toggleMeaning = function() {
            document.getElementById('meaning').classList.toggle('show');
        };

        // 下一个单词
        window.nextWord = function() {
            currentWordIndex = Math.floor(Math.random() * cet6Words.length);
            showWord(currentWordIndex);
        };

        // 渲染网站列表
        function renderWebsites() {
            const grid = document.getElementById('websitesGrid');
            grid.innerHTML = '';

            websites.forEach((site, index) => {
                const card = document.createElement('div');
                card.style.position = 'relative';
                card.innerHTML = `
                    <a href="${site.url}" target="_blank" class="website-card">
                        <div class="website-name">${site.name}</div>
                        <div class="website-desc">${site.desc}</div>
                        <button class="delete-site-btn" onclick="deleteWebsite(${index}); event.preventDefault();" title="删除">×</button>
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        // 添加新网站
        window.addWebsite = function() {
            const name = prompt('输入网站名称：');
            if (!name) return;

            const url = prompt('输入网站地址（例如：https://www.example.com）：');
            if (!url) return;

            const desc = prompt('输入网站描述（可选）：') || '';

            websites.push({ name, url, desc });
            saveUserData();
            renderWebsites();
        };

        // 删除网站
        window.deleteWebsite = function(index) {
            if (confirm('确定要删除这个网站吗？')) {
                websites.splice(index, 1);
                saveUserData();
                renderWebsites();
            }
        };

        // 初始化
        function init() {
            nextWord();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
