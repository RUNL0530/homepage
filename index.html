<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #172033;
            --muted: #667085;
            --line: #d9e0ea;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --teal: #0f9f8f;
            --green: #16a34a;
            --amber: #d97706;
            --red: #dc2626;
            --shadow: 0 16px 42px rgba(29, 41, 57, 0.12);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            background:
                radial-gradient(circle at top left, rgba(15, 159, 143, 0.14), transparent 28rem),
                linear-gradient(135deg, #f4f7fb 0%, #eef3f8 55%, #f7f4ee 100%);
            color: var(--text);
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .container {
            width: min(1400px, 100%);
            margin: 0 auto;
        }

        .top-bar,
        .tool-card,
        .data-card,
        .websites-section {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(217, 224, 234, 0.78);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .top-bar {
            padding: 18px;
            margin-bottom: 18px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .search-input,
        .todo-input {
            width: 100%;
            min-width: 0;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            color: var(--text);
            outline: none;
        }

        .search-input:focus,
        .todo-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            flex: 0 0 auto;
            border: 2px solid rgba(37, 99, 235, 0.35);
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 700;
        }

        .user-email,
        .login-prompt,
        .sync-status,
        .card-note,
        .empty-state {
            color: var(--muted);
            font-size: 13px;
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: var(--radius);
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            line-height: 1.2;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.24);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-small {
            min-height: 32px;
            padding: 7px 10px;
            font-size: 13px;
        }

        .btn-secondary {
            background: #475467;
        }

        .btn-secondary:hover {
            background: #344054;
            box-shadow: 0 8px 18px rgba(52, 64, 84, 0.2);
        }

        .btn-success {
            background: var(--green);
        }

        .btn-success:hover {
            background: #15803d;
            box-shadow: 0 8px 18px rgba(22, 163, 74, 0.2);
        }

        .btn-warning {
            background: var(--amber);
        }

        .btn-warning:hover {
            background: #b45309;
            box-shadow: 0 8px 18px rgba(217, 119, 6, 0.2);
        }

        .btn-danger {
            background: var(--red);
        }

        .btn-danger:hover {
            background: #b91c1c;
            box-shadow: 0 8px 18px rgba(220, 38, 38, 0.2);
        }

        .btn-login {
            background: #1a73e8;
        }

        .btn-logout {
            background: var(--red);
        }

        .grid-three {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
        }

        .grid-two {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
        }

        .tool-card,
        .data-card,
        .websites-section {
            padding: 22px;
        }

        .card-title,
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
            font-size: 20px;
            font-weight: 800;
        }

        .countdown-display,
        .pomodoro-timer,
        .word-title {
            color: var(--primary);
            font-weight: 800;
            text-align: center;
        }

        .countdown-display {
            min-height: 64px;
            font-size: 48px;
            line-height: 1.1;
        }

        .countdown-unit {
            margin: 8px 0 16px;
            color: var(--muted);
            text-align: center;
        }

        .pomodoro-timer {
            margin: 12px 0 16px;
            font-variant-numeric: tabular-nums;
            font-size: 58px;
            line-height: 1.1;
        }

        .button-row,
        .pomodoro-controls,
        .todo-input-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button-row,
        .pomodoro-controls {
            justify-content: center;
        }

        .word-title {
            min-height: 58px;
            margin-bottom: 8px;
            font-size: 44px;
            line-height: 1.1;
            overflow-wrap: anywhere;
        }

        .word-phonetic {
            min-height: 26px;
            margin-bottom: 10px;
            color: var(--muted);
            text-align: center;
            font-size: 18px;
        }

        .word-meaning {
            display: none;
            min-height: 54px;
            margin-bottom: 14px;
            padding: 12px;
            border-radius: var(--radius);
            background: #f3f6fa;
            color: #344054;
            line-height: 1.55;
            white-space: pre-line;
        }

        .word-meaning.show {
            display: block;
        }

        .stats {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        .todo-input-box {
            margin-bottom: 14px;
        }

        .todo-input-box .todo-input {
            flex: 1 1 220px;
        }

        .todo-list,
        .project-list {
            display: grid;
            gap: 10px;
            list-style: none;
        }

        .todo-item,
        .project-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fbfcfe;
        }

        .todo-checkbox {
            width: 19px;
            height: 19px;
            flex: 0 0 auto;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .todo-item.completed .todo-text {
            color: var(--muted);
            text-decoration: line-through;
        }

        .project-item {
            align-items: flex-start;
            border-left: 4px solid var(--teal);
        }

        .project-main {
            flex: 1;
            min-width: 0;
        }

        .project-name {
            margin-bottom: 6px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .project-desc {
            margin-bottom: 8px;
            color: var(--muted);
            overflow-wrap: anywhere;
        }

        .project-status {
            display: inline-flex;
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(15, 159, 143, 0.12);
            color: #0f766e;
            font-size: 12px;
            font-weight: 700;
        }

        .websites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .website-card {
            position: relative;
            min-height: 104px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, #2563eb 0%, #0f9f8f 100%);
            color: #fff;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .website-card:hover {
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
            transform: translateY(-2px);
        }

        .website-link {
            display: flex;
            min-height: 104px;
            padding: 18px 34px 18px 18px;
            color: inherit;
            text-align: center;
            text-decoration: none;
            flex-direction: column;
            justify-content: center;
        }

        .website-name {
            margin-bottom: 6px;
            font-size: 17px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .website-desc {
            opacity: 0.9;
            font-size: 12px;
            overflow-wrap: anywhere;
        }

        .delete-site-btn {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 26px;
            height: 26px;
            min-height: 26px;
            padding: 0;
            border-radius: 50%;
            background: rgba(17, 24, 39, 0.45);
            color: #fff;
            font-size: 18px;
            line-height: 1;
        }

        .empty-state {
            padding: 12px;
            border: 1px dashed var(--line);
            border-radius: var(--radius);
            background: #fbfcfe;
        }

        @media (max-width: 1100px) {
            .grid-three {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .grid-two {
                grid-template-columns: 1fr;
            }

            .search-box,
            .user-bar {
                align-items: stretch;
                flex-direction: column;
            }

            .word-title,
            .countdown-display {
                font-size: 36px;
            }

            .pomodoro-timer {
                font-size: 44px;
            }

            .websites-grid {
                grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="top-bar">
            <div class="search-box">
                <input class="search-input" id="searchInput" type="text" placeholder="快速搜索 Google / 百度 / GitHub..." autocomplete="off">
                <button class="btn" id="searchBtn" type="button">搜索</button>
            </div>
            <div class="user-bar">
                <div id="userInfo" class="user-info">
                    <div class="login-prompt">请先登录以同步数据</div>
                </div>
                <div class="button-row">
                    <button class="btn btn-login" id="loginBtn" type="button">Google 登录</button>
                    <button class="btn btn-logout" id="logoutBtn" type="button" style="display: none;">退出登录</button>
                </div>
            </div>
        </section>

        <section class="grid-three">
            <article class="tool-card">
                <div class="card-title">距离六级考试</div>
                <div class="countdown-display" id="countdownDays">-</div>
                <div class="countdown-unit" id="countdownUnit">天</div>
                <div class="button-row">
                    <button class="btn btn-secondary" id="setExamDateBtn" type="button">设置日期</button>
                </div>
            </article>

            <article class="tool-card">
                <div class="card-title">番茄钟</div>
                <div class="pomodoro-timer" id="pomodoroTimer">25:00</div>
                <div class="pomodoro-controls">
                    <button class="btn btn-success" id="startPomodoroBtn" type="button">开始</button>
                    <button class="btn btn-warning" id="pausePomodoroBtn" type="button">暂停</button>
                    <button class="btn btn-danger" id="resetPomodoroBtn" type="button">重置</button>
                </div>
                <p class="card-note" id="pomodoroStatus">专注 25 分钟，休息 5 分钟</p>
            </article>

            <article class="tool-card">
                <div class="card-title">六级单词</div>
                <div class="word-title" id="word">Loading...</div>
                <div class="word-phonetic" id="phonetic"></div>
                <div class="word-meaning" id="meaning"></div>
                <div class="button-row">
                    <button class="btn btn-secondary" id="toggleMeaningBtn" type="button">显示释义</button>
                    <button class="btn" id="nextWordBtn" type="button">换一个</button>
                </div>
                <div class="stats">
                    今日已学：<strong id="todayCount">0</strong> 个
                    <span id="syncStatus" class="sync-status" style="display: none;">
                        <span class="sync-indicator"></span>
                        <span id="syncStatusText">已同步到云端</span>
                    </span>
                </div>
            </article>
        </section>

        <section class="grid-two">
            <article class="data-card">
                <div class="section-title">待办事项</div>
                <div class="todo-input-box">
                    <input class="todo-input" id="todoInput" type="text" placeholder="添加新任务..." autocomplete="off">
                    <button class="btn" id="addTodoBtn" type="button">添加</button>
                </div>
                <ul class="todo-list" id="todoList"></ul>
            </article>

            <article class="data-card">
                <div class="section-title">硬件项目</div>
                <div class="project-list" id="projectList"></div>
                <div class="button-row" style="margin-top: 14px;">
                    <button class="btn" id="addProjectBtn" type="button">添加项目</button>
                </div>
            </article>
        </section>

        <section class="websites-section">
            <div class="section-title">常用网站</div>
            <div class="websites-grid" id="websitesGrid"></div>
            <button class="btn btn-success" id="addWebsiteBtn" type="button">添加网站</button>
        </section>
    </main>

            { name: "Google", url: "https://www.google.com", desc: "搜索引擎" },
            { name: "GitHub", url: "https://github.com", desc: "代码托管" },
            { name: "B站", url: "https://www.bilibili.com", desc: "视频网站" },
            { name: "知乎", url: "https://www.zhihu.com", desc: "问答社区" },
            { name: "淘宝", url: "https://www.taobao.com", desc: "购物网站" },
            { name: "YouTube", url: "https://www.youtube.com", desc: "视频平台" },
            { name: "ChatGPT", url: "https://chat.openai.com", desc: "AI 助手" }
        ];

        const elements = {
            userInfo: document.getElementById("userInfo"),
            loginBtn: document.getElementById("loginBtn"),
            logoutBtn: document.getElementById("logoutBtn"),
            syncStatus: document.getElementById("syncStatus"),
            syncStatusText: document.getElementById("syncStatusText"),
            searchInput: document.getElementById("searchInput"),
            searchBtn: document.getElementById("searchBtn"),
            countdownDays: document.getElementById("countdownDays"),
            countdownUnit: document.getElementById("countdownUnit"),
            setExamDateBtn: document.getElementById("setExamDateBtn"),
            pomodoroTimer: document.getElementById("pomodoroTimer"),
            pomodoroStatus: document.getElementById("pomodoroStatus"),
            startPomodoroBtn: document.getElementById("startPomodoroBtn"),
            pausePomodoroBtn: document.getElementById("pausePomodoroBtn"),
            resetPomodoroBtn: document.getElementById("resetPomodoroBtn"),
            word: document.getElementById("word"),
            phonetic: document.getElementById("phonetic"),
            meaning: document.getElementById("meaning"),
            toggleMeaningBtn: document.getElementById("toggleMeaningBtn"),
            nextWordBtn: document.getElementById("nextWordBtn"),
            todayCount: document.getElementById("todayCount"),
            todoInput: document.getElementById("todoInput"),
            addTodoBtn: document.getElementById("addTodoBtn"),
            todoList: document.getElementById("todoList"),
            projectList: document.getElementById("projectList"),
            addProjectBtn: document.getElementById("addProjectBtn"),
            websitesGrid: document.getElementById("websitesGrid"),
            addWebsiteBtn: document.getElementById("addWebsiteBtn")
        };

        let currentUser = null;
        let unsubscribeSnapshot = null;
        let activeWordIndex = null;
        let userData = createDefaultData();
        let pomodoroInterval = null;
        let pomodoroSeconds = 25 * 60;
        let pomodoroRunning = false;

        function todayKey(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            return `${year}-${month}-${day}`;
        }

        function isToday(value) {
            return value === todayKey() || value === new Date().toDateString();
        }

        function cloneDefaultWebsites() {
            return defaultWebsites.map((site) => ({ ...site }));
        }

        function createDefaultData() {
            return {
                websites: cloneDefaultWebsites(),
                todos: [],
                projects: [],
                examDate: null,
                todayCount: 0,
                viewedWords: [],
                lastDate: todayKey()
            };
        }

        function parseJson(value) {
            if (!value) return null;
            try {
                return JSON.parse(value);
            } catch (error) {
                console.warn("本地数据解析失败，已使用默认数据。", error);
                return null;
            }
        }

        function asText(value) {
            return typeof value === "string" ? value.trim() : "";
        }

        function normalizeUrl(input) {
            const raw = asText(input);
            if (!raw) return null;
            const withProtocol = /^[a-z][a-z0-9+.-]*:/i.test(raw) ? raw : `https://${raw}`;

            try {
                const url = new URL(withProtocol);
                if (url.protocol !== "http:" && url.protocol !== "https:") {
                    return null;
                }
                return url.href;
            } catch {
                return null;
            }
        }

        function normalizeWebsites(websites) {
            if (!Array.isArray(websites)) return cloneDefaultWebsites();
            return websites
                .map((site) => ({
                    name: asText(site?.name),
                    url: normalizeUrl(site?.url),
                    desc: asText(site?.desc)
                }))
                .filter((site) => site.name && site.url);
        }

        function normalizeTodos(todos) {
            if (!Array.isArray(todos)) return [];
            return todos
                .map((todo) => ({
                    id: asText(todo?.id) || String(todo?.id || makeId("todo")),
                    text: asText(todo?.text),
                    completed: Boolean(todo?.completed)
                }))
                .filter((todo) => todo.text);
        }

        function normalizeProjects(projects) {
            if (!Array.isArray(projects)) return [];
            return projects
                .map((project) => ({
                    id: asText(project?.id) || String(project?.id || makeId("project")),
                    name: asText(project?.name),
                    desc: asText(project?.desc),
                    status: asText(project?.status) || "进行中"
                }))
                .filter((project) => project.name);
        }

        function normalizeViewedWords(viewedWords) {
            if (!Array.isArray(viewedWords)) return [];
            const validIndexes = viewedWords
                .map((index) => Number(index))
                .filter((index) => Number.isInteger(index) && index >= 0 && index < cet6Words.length);
            return Array.from(new Set(validIndexes));
        }

        function normalizeUserData(data) {
            const base = createDefaultData();
            const source = data && typeof data === "object" ? data : {};
            const normalized = {
                ...base,
                ...source,
                websites: Array.isArray(source.websites) ? normalizeWebsites(source.websites) : base.websites,
                todos: normalizeTodos(source.todos),
                projects: normalizeProjects(source.projects),
                examDate: asText(source.examDate) || null,
                todayCount: Math.max(0, Number(source.todayCount) || 0),
                viewedWords: normalizeViewedWords(source.viewedWords),
                lastDate: asText(source.lastDate) || todayKey()
            };

            if (!isToday(normalized.lastDate)) {
                normalized.todayCount = 0;
                normalized.viewedWords = [];
                normalized.lastDate = todayKey();
            } else {
                normalized.lastDate = todayKey();
            }

            normalized.todayCount = Math.min(normalized.todayCount, normalized.viewedWords.length || normalized.todayCount);
            return normalized;
        }

        function resetDailyWordProgressIfNeeded() {
            if (!isToday(userData.lastDate)) {
                userData.todayCount = 0;
                userData.viewedWords = [];
                userData.lastDate = todayKey();
                elements.todayCount.textContent = "0";
                return;
            }

            userData.lastDate = todayKey();
            userData.viewedWords = normalizeViewedWords(userData.viewedWords);
            userData.todayCount = Math.max(0, Number(userData.todayCount) || 0);
        }

        function makeId(prefix) {
            if (crypto?.randomUUID) {
                return `${prefix}-${crypto.randomUUID()}`;
            }
            return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

        function dataForStorage() {
            userData = normalizeUserData(userData);
            return {
                websites: userData.websites,
                todos: userData.todos,
                projects: userData.projects,
                examDate: userData.examDate,
                todayCount: userData.todayCount,
                viewedWords: userData.viewedWords,
                lastDate: userData.lastDate
            };
        }

        function readLocalData() {
            const current = parseJson(localStorage.getItem(STORAGE_KEY));
            if (current) return normalizeUserData(current);

            const legacyStats = parseJson(localStorage.getItem(LEGACY_STATS_KEY)) || {};
            const legacyWebsites = parseJson(localStorage.getItem(LEGACY_WEBSITES_KEY));
            return normalizeUserData({
                ...legacyStats,
                websites: Array.isArray(legacyWebsites) ? legacyWebsites : undefined
            });
        }

        function saveLocalData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataForStorage()));
        }

        async function saveUserData() {
            const payload = dataForStorage();

            if (!currentUser) {
                saveLocalData();
                return;
            }

            try {
                const userDocRef = doc(db, "users", currentUser.uid);
                await setDoc(userDocRef, {
                    ...payload,
                    updatedAt: new Date().toISOString()
                }, { merge: true });
                setSyncStatus("已同步到云端");
            } catch (error) {
                console.error("保存数据失败:", error);
                setSyncStatus("同步失败");
            }
        }

        function setSyncStatus(text) {
            if (!currentUser) {
                elements.syncStatus.style.display = "none";
                return;
            }

            elements.syncStatusText.textContent = text;
            elements.syncStatus.style.display = "inline-flex";
        }

        function clearFirestoreListener() {
            if (unsubscribeSnapshot) {
                unsubscribeSnapshot();
                unsubscribeSnapshot = null;
            }
        }

        function loadUserData(uid) {
            clearFirestoreListener();
            const userDocRef = doc(db, "users", uid);
            setSyncStatus("正在同步...");

            unsubscribeSnapshot = onSnapshot(userDocRef, async (snapshot) => {
                if (snapshot.exists()) {
                    userData = normalizeUserData(snapshot.data());
                    setSyncStatus("已同步到云端");
                } else {
                    userData = readLocalData();
                    await saveUserData();
                }
                renderAll();
            }, (error) => {
                console.error("加载云端数据失败:", error);
                setSyncStatus("同步失败");
                userData = readLocalData();
                renderAll();
            });
        }

        function showUserInfo(user) {
            elements.userInfo.replaceChildren();

            const avatar = document.createElement("img");
            avatar.className = "user-avatar";
            avatar.alt = "头像";
            avatar.referrerPolicy = "no-referrer";
            avatar.src = user.photoURL || "https://via.placeholder.com/80?text=U";

            const textWrap = document.createElement("div");
            const name = document.createElement("div");
            name.className = "user-name";
            name.textContent = user.displayName || "用户";

            const email = document.createElement("div");
            email.className = "user-email";
            email.textContent = user.email || "";

            textWrap.append(name, email);
            elements.userInfo.append(avatar, textWrap);
            elements.loginBtn.style.display = "none";
            elements.logoutBtn.style.display = "inline-flex";
            setSyncStatus("正在同步...");
        }

        function showLoginPrompt() {
            elements.userInfo.replaceChildren();
            const prompt = document.createElement("div");
            prompt.className = "login-prompt";
            prompt.textContent = "请先登录以同步数据";
            elements.userInfo.append(prompt);
            elements.loginBtn.style.display = "inline-flex";
            elements.logoutBtn.style.display = "none";
            elements.syncStatus.style.display = "none";
        }

        function renderAll() {
            userData = normalizeUserData(userData);
            elements.todayCount.textContent = String(userData.todayCount);
            renderTodos();
            renderProjects();
            renderWebsites();
            updateCountdown();
            ensureWordShown();
        }

        function addEmptyState(parent, text, tagName = "div") {
            const empty = document.createElement(tagName);
            empty.className = "empty-state";
            empty.textContent = text;
            parent.append(empty);
        }

        function renderTodos() {
            elements.todoList.replaceChildren();
            if (!userData.todos.length) {
                addEmptyState(elements.todoList, "暂无待办", "li");
                return;
            }

            userData.todos.forEach((todo) => {
                const item = document.createElement("li");
                item.className = todo.completed ? "todo-item completed" : "todo-item";

                const checkbox = document.createElement("input");
                checkbox.className = "todo-checkbox";
                checkbox.type = "checkbox";
                checkbox.checked = todo.completed;
                checkbox.addEventListener("change", () => toggleTodo(todo.id));

                const text = document.createElement("span");
                text.className = "todo-text";
                text.textContent = todo.text;

                const remove = document.createElement("button");
                remove.className = "btn btn-danger btn-small";
                remove.type = "button";
                remove.textContent = "删除";
                remove.addEventListener("click", () => deleteTodo(todo.id));

                item.append(checkbox, text, remove);
                elements.todoList.append(item);
            });
        }

        function renderProjects() {
            elements.projectList.replaceChildren();
            if (!userData.projects.length) {
                addEmptyState(elements.projectList, "暂无项目");
                return;
            }

            userData.projects.forEach((project) => {
                const item = document.createElement("div");
                item.className = "project-item";

                const main = document.createElement("div");
                main.className = "project-main";

                const name = document.createElement("div");
                name.className = "project-name";
                name.textContent = project.name;

                const desc = document.createElement("div");
                desc.className = "project-desc";
                desc.textContent = project.desc || "未填写描述";

                const status = document.createElement("span");
                status.className = "project-status";
                status.textContent = project.status;

                const remove = document.createElement("button");
                remove.className = "btn btn-danger btn-small";
                remove.type = "button";
                remove.textContent = "删除";
                remove.addEventListener("click", () => deleteProject(project.id));

                main.append(name, desc, status);
                item.append(main, remove);
                elements.projectList.append(item);
            });
        }

        function renderWebsites() {
            elements.websitesGrid.replaceChildren();
            if (!userData.websites.length) {
                addEmptyState(elements.websitesGrid, "暂无网站");
                return;
            }

            userData.websites.forEach((site, index) => {
                const card = document.createElement("div");
                card.className = "website-card";

                const link = document.createElement("a");
                link.className = "website-link";
                link.href = site.url;
                link.target = "_blank";
                link.rel = "noopener noreferrer";

                const name = document.createElement("div");
                name.className = "website-name";
                name.textContent = site.name;

                const desc = document.createElement("div");
                desc.className = "website-desc";
                desc.textContent = site.desc;

                const remove = document.createElement("button");
                remove.className = "delete-site-btn";
                remove.type = "button";
                remove.title = "删除";
                remove.setAttribute("aria-label", `删除 ${site.name}`);
                remove.textContent = "×";
                remove.addEventListener("click", () => deleteWebsite(index));

                link.append(name, desc);
                card.append(link, remove);
                elements.websitesGrid.append(card);
            });
        }

        function randomWordIndex() {
            return Math.floor(Math.random() * cet6Words.length);
        }

        function ensureWordShown() {
            if (activeWordIndex === null) {
                displayWord(randomWordIndex(), false);
            }
        }

        function displayWord(index, countAsViewed) {
            const wordData = cet6Words[index];
            if (!wordData) return;

            activeWordIndex = index;
            elements.word.textContent = wordData.word;
            elements.phonetic.textContent = wordData.phonetic;
            elements.meaning.textContent = wordData.meaning;
            elements.meaning.classList.remove("show");
            elements.toggleMeaningBtn.textContent = "显示释义";

            if (countAsViewed) {
                resetDailyWordProgressIfNeeded();
                if (!userData.viewedWords.includes(index)) {
                    const baseCount = Math.max(userData.todayCount, userData.viewedWords.length);
                    userData.viewedWords.push(index);
                    userData.todayCount = Math.max(baseCount + 1, userData.viewedWords.length);
                    userData.lastDate = todayKey();
                    elements.todayCount.textContent = String(userData.todayCount);
                    saveUserData();
                }
            }
        }

        function nextWord() {
            displayWord(randomWordIndex(), true);
        }

        function toggleMeaning() {
            const isVisible = elements.meaning.classList.toggle("show");
            elements.toggleMeaningBtn.textContent = isVisible ? "隐藏释义" : "显示释义";
        }

        function quickSearch() {
            const query = elements.searchInput.value.trim();
            if (!query) return;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, "_blank", "noopener,noreferrer");
        }

        function updateCountdown() {
            if (!userData.examDate) {
                elements.countdownDays.textContent = "未设置";
                elements.countdownUnit.textContent = "天";
                return;
            }

            const target = new Date(`${userData.examDate}T00:00:00`);
            if (Number.isNaN(target.getTime())) {
                elements.countdownDays.textContent = "日期无效";
                elements.countdownUnit.textContent = "请重新设置";
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diff = Math.ceil((target - today) / 86400000);
            elements.countdownDays.textContent = diff >= 0 ? String(diff) : "已过期";
            elements.countdownUnit.textContent = diff >= 0 ? "天" : "请重新设置";
        }

        function setExamDate() {
            const dateStr = prompt("输入六级考试日期（格式：2026-12-15）：", userData.examDate || "");
            if (dateStr === null) return;

            const value = dateStr.trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(value) || Number.isNaN(new Date(`${value}T00:00:00`).getTime())) {
                alert("请输入有效日期，例如：2026-12-15");
                return;
            }

            userData.examDate = value;
            updateCountdown();
            saveUserData();
        }

        function updatePomodoroDisplay() {
            const mins = Math.floor(pomodoroSeconds / 60);
            const secs = pomodoroSeconds % 60;
            elements.pomodoroTimer.textContent = `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
        }

        function startPomodoro() {
            if (pomodoroRunning) return;
            pomodoroRunning = true;
            elements.pomodoroStatus.textContent = "专注中";
            pomodoroInterval = setInterval(() => {
                pomodoroSeconds -= 1;
                if (pomodoroSeconds <= 0) {
                    resetPomodoro();
                    alert("时间到！休息一下吧。");
                    return;
                }
                updatePomodoroDisplay();
            }, 1000);
        }

        function pausePomodoro() {
            pomodoroRunning = false;
            clearInterval(pomodoroInterval);
            elements.pomodoroStatus.textContent = "已暂停";
        }

        function resetPomodoro() {
            pomodoroRunning = false;
            clearInterval(pomodoroInterval);
            pomodoroSeconds = 25 * 60;
            elements.pomodoroStatus.textContent = "专注 25 分钟，休息 5 分钟";
            updatePomodoroDisplay();
        }

        function addTodo() {
            const text = elements.todoInput.value.trim();
            if (!text) return;

            userData.todos.push({ id: makeId("todo"), text, completed: false });
            elements.todoInput.value = "";
            renderTodos();
            saveUserData();
        }

        function toggleTodo(id) {
            const todo = userData.todos.find((item) => item.id === id);
            if (!todo) return;

            todo.completed = !todo.completed;
            renderTodos();
            saveUserData();
        }

        function deleteTodo(id) {
            userData.todos = userData.todos.filter((todo) => todo.id !== id);
            renderTodos();
            saveUserData();
        }

        function addProject() {
            const name = prompt("项目名称：");
            if (!name?.trim()) return;

            const desc = prompt("项目描述：") || "";
            const status = prompt("状态（进行中 / 已完成 / 计划中）：") || "进行中";
            userData.projects.push({
                id: makeId("project"),
                name: name.trim(),
                desc: desc.trim(),
                status: status.trim() || "进行中"
            });
            renderProjects();
            saveUserData();
        }

        function deleteProject(id) {
            if (!confirm("确定删除这个项目吗？")) return;
            userData.projects = userData.projects.filter((project) => project.id !== id);
            renderProjects();
            saveUserData();
        }

        function addWebsite() {
            const name = prompt("网站名称：");
            if (!name?.trim()) return;

            const urlInput = prompt("网站地址（例如：https://www.example.com）：");
            const url = normalizeUrl(urlInput);
            if (!url) {
                alert("请输入有效的网址，支持 http 或 https。");
                return;
            }

            const desc = prompt("描述（可选）：") || "";
            userData.websites.push({ name: name.trim(), url, desc: desc.trim() });
            renderWebsites();
            saveUserData();
        }

        function deleteWebsite(index) {
            if (!confirm("确定要删除这个网站吗？")) return;
            userData.websites.splice(index, 1);
            renderWebsites();
            saveUserData();
        }

        elements.searchBtn.addEventListener("click", quickSearch);
        elements.searchInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") quickSearch();
        });
        elements.loginBtn.addEventListener("click", async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("登录失败:", error);
                alert(`登录失败：${error.message}`);
            }
        });
        elements.logoutBtn.addEventListener("click", async () => {
            try {
                clearFirestoreListener();
                await signOut(auth);
            } catch (error) {
                console.error("登出失败:", error);
                alert(`登出失败：${error.message}`);
            }
        });
        elements.setExamDateBtn.addEventListener("click", setExamDate);
        elements.startPomodoroBtn.addEventListener("click", startPomodoro);
        elements.pausePomodoroBtn.addEventListener("click", pausePomodoro);
        elements.resetPomodoroBtn.addEventListener("click", resetPomodoro);
        elements.toggleMeaningBtn.addEventListener("click", toggleMeaning);
        elements.nextWordBtn.addEventListener("click", nextWord);
        elements.addTodoBtn.addEventListener("click", addTodo);
        elements.todoInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") addTodo();
        });
        elements.addProjectBtn.addEventListener("click", addProject);
        elements.addWebsiteBtn.addEventListener("click", addWebsite);

        showLoginPrompt();
        userData = readLocalData();
        renderAll();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                showUserInfo(user);
                loadUserData(user.uid);
            } else {
                clearFirestoreListener();
                showLoginPrompt();
                userData = readLocalData();
                renderAll();
            }
        });

        updatePomodoroDisplay();
        setInterval(updateCountdown, 60000);

        window.homepageDebug = {
            getData: () => structuredClone(dataForStorage()),
            showWordWithoutCounting: () => displayWord(randomWordIndex(), false)
        };
    </script>
</body>
</html>
